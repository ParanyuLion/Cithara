{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cithara — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #121212;
      --surface:    #181818;
      --accent:     #1DB954;
      --text:       #FFFFFF;
      --text-muted: #b3b3b3;
      --font-sans:  'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 56px 48px;
      text-align: center;
      width: 360px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }
    .logo-icon { font-size: 52px; line-height: 1; margin-bottom: 12px; }
    .logo-text {
      color: var(--text);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .tagline {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 48px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: var(--accent);
      color: #000;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 50px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: #1ed760; transform: scale(1.02); }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon">♪</div>
    <div class="logo-text">Cithara</div>
    <div class="tagline">AI-powered song generation</div>
    <a class="btn" href="{% provider_login_url 'google' %}">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#000" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#000" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#000" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#000" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>
  </div>
</body>
</html>
